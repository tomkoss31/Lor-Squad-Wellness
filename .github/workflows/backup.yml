name: Sauvegarde Supabase
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Lancer la sauvegarde
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run backup

      - name: Committer les backups
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@lorsquad.app"
          git add -f backups/
          git diff --staged --quiet || git commit -m "backup: $(date +%Y-%m-%d)"
          git push

      - name: Récap hebdo (dimanche) → crée une issue GitHub
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ne s'exécute que le dimanche (jour 7)
          if [ "$(date -u +%u)" = "7" ]; then
            DATE=$(date -u +%Y-%m-%d)
            MANIFEST="backups/$DATE/manifest.json"
            if [ -f "$MANIFEST" ]; then
              TOTAL=$(jq -r '.total' "$MANIFEST")
              DETAILS=$(jq -r '.tables | to_entries | map("- **\(.key)** : \(.value) enregistrements") | join("\n")' "$MANIFEST")
              gh issue create \
                --title "📊 Récap backup Lor'Squad — $DATE" \
                --body "## ✅ Sauvegarde hebdomadaire OK

          **Total sauvegardé aujourd'hui : $TOTAL enregistrements**

          $DETAILS

          ---

          📂 [Voir les sauvegardes](../tree/main/backups)
          📖 [Guide de restauration](../blob/main/backups/README.md)

          Si tu reçois cet email, ta sauvegarde tourne normalement. ✨"
            fi
          fi
