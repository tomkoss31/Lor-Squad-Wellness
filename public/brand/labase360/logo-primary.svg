<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="vitalFusion" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="topShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cercle principal (centré dans 600x600 avec marge pour pastille) -->
  <!-- Cercle = 440px, centré à (260, 320) pour laisser place à pastille en haut-droite -->
  <circle cx="260" cy="320" r="220" fill="url(#vitalFusion)" filter="url(#dropShadow)"/>

  <!-- Reflet brillant haut -->
  <ellipse cx="260" cy="190" rx="170" ry="60" fill="url(#topShine)"/>

  <!-- Lettre B blanche, centrée dans le cercle -->
  <text x="260" y="395"
        font-family="Sora, sans-serif"
        font-weight="700"
        font-size="280"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="-15">B</text>

  <!-- Pastille "360" en haut-droite, ENTIÈREMENT VISIBLE dans le viewBox -->
  <!-- Centre pastille à (470, 130), taille 130x70 -->
  <g transform="translate(470, 130) rotate(8)">
    <rect x="-70" y="-35" width="140" height="70" rx="20"
          fill="#FFFFFF"
          filter="url(#dropShadow)"/>
    <text x="0" y="14"
          font-family="Sora, sans-serif"
          font-weight="600"
          font-size="42"
          font-style="italic"
          fill="url(#vitalFusion)"
          text-anchor="middle"
          letter-spacing="2">360</text>
  </g>
</svg>
