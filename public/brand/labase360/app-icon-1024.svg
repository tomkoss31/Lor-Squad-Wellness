<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="vitalFusion" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="topShineIcon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- App icon iOS = squircle (rounded square 22.5%) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#vitalFusion)"/>

  <!-- Reflet haut -->
  <rect x="80" y="80" width="864" height="400" rx="200" fill="url(#topShineIcon)"/>

  <!-- Lettre B centrée -->
  <text x="512" y="700"
        font-family="Sora, sans-serif"
        font-weight="700"
        font-size="600"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="-30">B</text>
</svg>
